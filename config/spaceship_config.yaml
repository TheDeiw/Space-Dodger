behaviors:
    Spaceship:
        trainer_type: ppo
        hyperparameters:
            batch_size: 2048
            buffer_size: 20480
            learning_rate: 0.0003
            beta: 0.005
            epsilon: 0.2
            lambd: 0.95
            num_epoch: 4
            shared_critic: false
            learning_rate_schedule: linear
            beta_schedule: linear
            epsilon_schedule: linear
        checkpoint_interval: 200000
        network_settings:
            normalize: true
            hidden_units: 256
            num_layers: 3
            vis_encode_type: simple
            deterministic: false
        reward_signals:
            extrinsic:
                gamma: 0.995
                strength: 1.0
        init_path: null
        keep_checkpoints: 10
        even_checkpoints: true
        max_steps: 30000000
        time_horizon: 256
        summary_freq: 10000
        threaded: false
        self_play: null
        behavioral_cloning: null
env_settings:
    env_path: null
    env_args: null
    base_port: 5005
    num_envs: 1
    num_areas: 16
    timeout_wait: 60
    seed: -1
    max_lifetime_restarts: 10
    restarts_rate_limit_n: 1
    restarts_rate_limit_period_s: 60
engine_settings:
    width: 84
    height: 84
    quality_level: 1
    time_scale: 20
    target_frame_rate: -1
    capture_frame_rate: 60
    no_graphics: true
    no_graphics_monitor: false
checkpoint_settings:
    run_id: overnightDual2
    initialize_from: null
    load_model: false
    resume: false
    force: false
    train_model: false
    inference: false
    results_dir: results
torch_settings:
    device: null
debug: false
